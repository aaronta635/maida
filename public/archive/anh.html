<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maida Lodge — Thư viện ảnh phòng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#2C3E2D; --moss:#4A6741; --sage:#7A9B6F; --mist:#D4E2C8;
    --cream:#F5F0E8; --stone:#C8B89A; --ink:#1E2820; --gold:#B8965A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}

  /* HERO */
  .hero{position:relative;background:var(--forest);padding:46px 24px 32px;text-align:center;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 80% 60% at 25% 100%,rgba(184,150,90,.20) 0%,transparent 60%),
               radial-gradient(ellipse 60% 80% at 80% 0%,rgba(74,103,65,.38) 0%,transparent 55%);}
  .hero-leaf{position:absolute;opacity:.06;font-size:180px;line-height:1;top:-20px;right:-10px;transform:rotate(18deg);}
  .hero-brand{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--sage);margin-bottom:8px;position:relative;}
  .hero-name{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(34px,9vw,50px);color:var(--cream);line-height:1.1;position:relative;}
  .hero-name em{font-style:italic;color:var(--stone);}
  .hero-sub{font-weight:300;font-size:12px;color:var(--mist);letter-spacing:.5px;margin-top:8px;position:relative;}
  .hero-divider{width:38px;height:1px;background:var(--gold);margin:18px auto 0;opacity:.7;position:relative;}

  /* FILTER TABS */
  .filter-bar{position:sticky;top:0;z-index:50;background:var(--forest);border-bottom:1px solid rgba(255,255,255,.08);display:flex;overflow-x:auto;scrollbar-width:none;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-btn{flex:0 0 auto;padding:14px 20px;font-size:12px;font-weight:400;letter-spacing:.5px;color:rgba(212,226,200,.5);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;}
  .filter-btn:hover{color:var(--mist);}
  .filter-btn.active{color:var(--stone);border-bottom-color:var(--gold);}

  /* ROOM SECTION */
  .gallery{padding:8px 14px 40px;max-width:920px;margin:0 auto;}
  .room-block{padding-top:26px;scroll-margin-top:64px;}
  .room-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;padding:0 4px;}
  .room-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,6vw,32px);font-weight:400;color:var(--forest);}
  .room-title em{font-style:italic;color:var(--moss);}
  .room-count{font-size:12px;color:var(--sage);}
  .room-desc{font-size:13px;color:#7a8b7b;line-height:1.6;padding:0 4px;margin-bottom:10px;}
  .room-specs{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:#6b5d3e;line-height:1.5;padding:8px 12px;margin:0 4px 12px;background:#EDE3D0;border-radius:8px;}
  .room-specs .rs-icon{font-size:13px;flex-shrink:0;}
  .video-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 4px 14px;}
  .local-video{margin:0 4px 16px;}
  .local-video video{width:100%;max-width:340px;display:block;margin:0 auto;border-radius:14px;background:#000;box-shadow:0 6px 20px rgba(44,62,45,.18);}
  .video-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--forest);background:none;border:1px solid var(--sage);padding:8px 16px;border-radius:40px;text-decoration:none;transition:all .2s;}
  .video-btn:hover{background:var(--forest);color:var(--cream);border-color:var(--forest);}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr);}}
  .cell{position:relative;aspect-ratio:4/3;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--mist);box-shadow:0 1px 6px rgba(44,62,45,.08);}
  .cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;opacity:0;}
  .cell img.loaded{opacity:1;}
  .cell:hover img{transform:scale(1.06);}
  .cell::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(30,40,32,.18),transparent 40%);opacity:0;transition:opacity .3s;}
  .cell:hover::after{opacity:1;}

  /* feature: full-width hero on mobile (so the 4/8 small tiles pair up evenly); 2x2 block on wider screens */
  .cell.feature{grid-column:span 2;}
  @media(min-width:560px){
    .cell.feature{grid-column:span 2;grid-row:span 2;}
  }

  /* LIGHTBOX */
  .lb{position:fixed;inset:0;z-index:1000;background:rgba(20,28,22,.96);display:none;align-items:center;justify-content:center;touch-action:none;}
  .lb.open{display:flex;}
  .lb-img-wrap{position:relative;max-width:100vw;max-height:100vh;display:flex;align-items:center;justify-content:center;}
  .lb-img{max-width:94vw;max-height:84vh;object-fit:contain;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5);user-select:none;-webkit-user-drag:none;}
  .lb-close{position:absolute;top:16px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;line-height:1;}
  .lb-close:hover{background:rgba(255,255,255,.22);}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:26px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;}
  .lb-nav:hover{background:rgba(255,255,255,.2);}
  .lb-prev{left:12px;} .lb-next{right:12px;}
  .lb-caption{position:absolute;bottom:18px;left:0;right:0;text-align:center;color:rgba(245,240,232,.85);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:.5px;z-index:2;}
  .lb-caption span{font-size:12px;color:rgba(212,226,200,.55);font-family:'Be Vietnam Pro';display:block;margin-top:2px;}
  @media(max-width:560px){.lb-nav{width:40px;height:40px;font-size:22px;background:rgba(255,255,255,.08);}}

  /* CTA back to hub */
  .hub-cta{text-align:center;padding:30px 20px 10px;}
  .hub-cta a{display:inline-block;background:var(--gold);color:var(--ink);font-size:13px;font-weight:500;letter-spacing:.5px;padding:12px 28px;border-radius:40px;text-decoration:none;}

  /* FOOTER */
  .site-footer{background:var(--ink);padding:26px 20px;text-align:center;color:rgba(212,226,200,.4);font-size:12px;line-height:1.8;}
  .site-footer .ff-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(212,226,200,.6);margin-bottom:6px;}
  .site-footer a{color:rgba(212,226,200,.55);text-decoration:none;}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-leaf">🌿</div>
  <div class="hero-brand">Thư viện ảnh</div>
  <div class="hero-name">Maida <em>Lodge</em></div>
  <div class="hero-sub">Phòng nghỉ &amp; không gian · Hồ Hoà Bình</div>
  <div class="hero-divider"></div>
</header>

<nav class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-room="all" onclick="filterRoom('all',this)">Tất cả</button>
  <button class="filter-btn" data-room="deluxe" onclick="filterRoom('deluxe',this)">Deluxe</button>
  <button class="filter-btn" data-room="supdeluxe" onclick="filterRoom('supdeluxe',this)">Superior Deluxe</button>
  <button class="filter-btn" data-room="bungalowho" onclick="filterRoom('bungalowho',this)">Bungalow Hồ</button>
  <button class="filter-btn" data-room="bungalowvuon" onclick="filterRoom('bungalowvuon',this)">Bungalow Vườn</button>
  <button class="filter-btn" data-room="duplex" onclick="filterRoom('duplex',this)">Duplex</button>
  <button class="filter-btn" data-room="hoatdong" onclick="filterRoom('hoatdong',this)">Hoạt động</button>
  <button class="filter-btn" data-room="khonggian" onclick="filterRoom('khonggian',this)">Không gian chung</button>
  <button class="filter-btn" data-room="tieccuoi" onclick="filterRoom('tieccuoi',this)">Tiệc cưới</button>
</nav>

<main class="gallery" id="gallery"></main>

<div class="hub-cta">
  <a href="https://maida-lodge.netlify.app">Xem giá &amp; đặt phòng →</a>
</div>

<footer class="site-footer">
  <div class="ff-name">Maida Lodge</div>
  Hồ Hoà Bình · Tiền Phong · Phú Thọ<br>
  Zalo / Hotline: 0982 015 445 · 0971 596 759<br>
  <a href="https://maida-lodge.netlify.app">maida-lodge.netlify.app</a>
</footer>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()" aria-label="Đóng">✕</button>
  <button class="lb-nav lb-prev" onclick="navLb(-1)" aria-label="Trước">‹</button>
  <div class="lb-img-wrap">
    <img class="lb-img" id="lbImg" src="" alt="">
  </div>
  <button class="lb-nav lb-next" onclick="navLb(1)" aria-label="Sau">›</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<script>
const ROOMS=[
  {slug:'deluxe', name:'Deluxe', titleEm:'Deluxe', unit:'3 phòng',
   desc:'Khu Deluxe hai tầng, sáu phòng — mỗi tầng ba phòng thông ban công, hướng vườn mít cao và thoáng. Hạng Deluxe nằm ở tầng hai (D2), phòng tắm đứng gọn gàng, nhiều ánh sáng.',
   specs:'2 khách tiêu chuẩn · tối đa 3 người lớn, hoặc 2 người lớn + 2 trẻ dưới 11 tuổi · giường phụ phụ thu theo bảng giá',
   videos:[{url:'https://www.facebook.com/share/r/1KGENoqMgP/', label:'Video hạng Deluxe (tầng 2)'}],
   imgs:['deluxe-1.jpg','deluxe-2.jpg','deluxe-3.jpg','deluxe-4.jpg','deluxe-5.jpg']},

  {slug:'supdeluxe', name:'Superior Deluxe', titleEm:'Superior Deluxe', unit:'3 phòng',
   desc:'Cùng khu Deluxe hai tầng, hạng Superior Deluxe nằm ở tầng một (D1) — phòng tắm bồn rộng, đẹp nhất khu nghỉ. Ban công thông hướng vườn mít, yên tĩnh và gần mặt đất.',
   specs:'2 khách tiêu chuẩn · tối đa 3 người lớn, hoặc 2 người lớn + 2 trẻ dưới 11 tuổi · giường phụ phụ thu theo bảng giá',
   videos:[{url:'https://www.facebook.com/share/r/1BvZLPpd27/', label:'Video hạng Superior Deluxe (tầng 1)'}],
   imgs:['supdeluxe-1.jpg','supdeluxe-2.jpg','supdeluxe-3.jpg','supdeluxe-4.jpg','supdeluxe-5.jpg']},

  {slug:'bungalowho', name:'Bungalow Hồ', titleEm:'Bungalow Hồ', unit:'7 phòng (đơn & đôi)',
   desc:'Khu bungalow hướng hồ — gồm các phòng đơn và đôi sát mặt nước, tầm nhìn mở ra mặt hồ mênh mông và những dãy núi đá vôi cổ phía trước. Ban công riêng nhìn thẳng ra hồ, ngắm trọn cả bình minh và hoàng hôn.',
   specs:'2 khách/phòng · tối đa 3 người lớn · giường phụ phụ thu theo bảng giá',
   videos:[{url:'https://www.facebook.com/share/r/1BZnYLG5YN/', label:'Video Bungalow'}],
   imgs:['bungalowho-1.jpg','bungalowho-2.jpg','bungalowho-6.jpg','bungalowho-4.jpg','bungalowho-7.jpg']},

  {slug:'bungalowvuon', name:'Bungalow Vườn', titleEm:'Bungalow Vườn', unit:'3 căn',
   desc:'Ba căn bungalow hướng vườn, rộng rãi, có bồn tắm và ban công riêng — phù hợp gia đình có trẻ em. Hướng vườn xoài và mít, xanh mát quanh năm.',
   specs:'2 khách/phòng · tối đa 3 người lớn · giường phụ phụ thu theo bảng giá',
   videos:[{url:'https://www.facebook.com/share/r/1BZnYLG5YN/', label:'Video Bungalow'}],
   imgs:['bungalowvuon-1.jpg','bungalowvuon-2.jpg','bungalowvuon-3.jpg','bungalowvuon-5.jpg','bungalowvuon-6.jpg']},

  {slug:'duplex', name:'Duplex', titleEm:'Duplex', unit:'1 phòng duy nhất',
   desc:'Phòng thông tầng duy nhất tại Maida — rộng rãi, thoáng mát, hướng vườn gần hồ yên tĩnh. Lựa chọn cho gia đình hoặc nhóm bạn muốn ở cùng nhau, một phòng tắm có bồn.',
   specs:'4 khách · có thể kê thêm giường phụ cho gia đình 5 người · phụ thu theo bảng giá',
   videos:[{url:'https://www.facebook.com/share/r/18zsb1KDyL/', label:'Video giới thiệu Duplex'}],
   imgs:['duplex-1.jpg','duplex-2.jpg','duplex-3.jpg','duplex-4.jpg','duplex-5.jpg']},

  {slug:'hoatdong', name:'Hoạt động & Trải nghiệm', titleEm:'Hoạt động & Trải nghiệm',
   desc:'Chèo kayak ngắm hoàng hôn trên hồ, yoga và thiền sáng sớm bên mặt nước, ngâm mình trong bồn tắm lá thuốc của người Dao, câu cá bè nổi, tô tượng và xếp gỗ cho trẻ, bi lắc bên hiên, hay đọc sách thư thả trên xích đu — Maida có trải nghiệm cho mọi thành viên.',
   specs:'',
   imgs:['hoatdong-1.jpg','hoatdong-3.jpg','hoatdong-4.jpg','hoatdong-10.jpg','hoatdong-5.jpg','hoatdong-6.jpg','hoatdong-7.jpg','hoatdong-8.jpg','hoatdong-9.jpg']},

  {slug:'khonggian', name:'Không gian chung', titleEm:'Không gian chung',
   desc:'Toàn cảnh từ trên cao, bể bơi vô cực soi mặt hồ lúc hoàng hôn và đêm xuống, terrace ven hồ, nhà hàng và cổng chào giữa vườn — không gian sinh hoạt chung của Maida bên hồ Hoà Bình.',
   specs:'',
   videos:[{url:'https://www.facebook.com/share/r/19cdwEHuUj/', label:'Maida từ trên cao'},{url:'https://www.facebook.com/share/r/17k9CGRJLo/', label:'Video không gian chung'}],
   imgs:['khonggian-1.jpg','khonggian-2.jpg','khonggian-3.jpg','khonggian-4.jpg','khonggian-5.jpg','khonggian-6.jpg','khonggian-7.jpg','khonggian-9.jpg','khonggian-10.jpg']},

  {slug:'tieccuoi', name:'Tiệc cưới & Sự kiện', titleEm:'Tiệc cưới & Sự kiện',
   desc:'Không gian tổ chức tiệc cưới và sự kiện bên hồ — sân khấu hoa và phông tre nứa hướng mặt nước, bàn tiệc dài thắp nến lúc hoàng hôn, hoa tươi và trang trí thủ công theo phong cách "Hands & Heart" của Maida. Một lễ cưới riêng tư giữa thiên nhiên Hoà Bình.',
   specs:'',
   imgs:['tieccuoi-1.jpg','tieccuoi-2.jpg','tieccuoi-3.jpg','tieccuoi-4.jpg','tieccuoi-5.jpg']},
];

// Flat list for lightbox navigation
let FLAT=[]; // {src, room, idxInRoom, roomName, total}
function buildFlat(){
  FLAT=[];
  ROOMS.forEach(r=>{
    r.imgs.forEach((img,i)=>{
      FLAT.push({full:'img/full/'+img, room:r.slug, roomName:r.name, n:i+1, total:r.imgs.length});
    });
  });
}

function render(){
  const g=document.getElementById('gallery');
  let html='';
  ROOMS.forEach(r=>{
    html+=`<section class="room-block" data-room="${r.slug}" id="sec-${r.slug}">
      <div class="room-head">
        <span class="room-title"><em>${r.titleEm}</em></span>
        ${r.unit?`<span class="room-count">${r.unit}</span>`:''}
      </div>
      <div class="room-desc">${r.desc}</div>
      ${r.specs?`<div class="room-specs"><span class="rs-icon">👥</span>${r.specs}</div>`:''}
      ${r.videos&&r.videos.length?`<div class="video-row">${r.videos.map(v=>`<a class="video-btn" href="${v.url}" target="_blank" rel="noopener">▶ ${v.label}</a>`).join('')}</div>`:''}
      ${r.localVideo?`<div class="local-video"><video controls playsinline preload="metadata" poster="${r.localVideo.poster}"><source src="${r.localVideo.src}" type="video/mp4"></video></div>`:''}
      <div class="grid">`;
    r.imgs.forEach((img,i)=>{
      const feat=i===0?' feature':'';
      const flatIdx=FLAT.findIndex(f=>f.full==='img/full/'+img);
      html+=`<div class="cell${feat}" onclick="openLb(${flatIdx})">
        <img data-src="img/thumb/${img}" alt="${r.name} ${i+1}">
      </div>`;
    });
    html+=`</div></section>`;
  });
  g.innerHTML=html;
  lazyLoad();
}

// Lazy load thumbs
function lazyLoad(){
  const imgs=document.querySelectorAll('.cell img[data-src]');
  const io=new IntersectionObserver((entries,obs)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const img=e.target;
        img.src=img.dataset.src;
        img.onload=()=>img.classList.add('loaded');
        img.removeAttribute('data-src');
        obs.unobserve(img);
      }
    });
  },{rootMargin:'200px'});
  imgs.forEach(i=>io.observe(i));
}

function filterRoom(slug,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.room-block').forEach(sec=>{
    sec.style.display=(slug==='all'||sec.dataset.room===slug)?'block':'none';
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── LIGHTBOX with tap/swipe that don't conflict ── */
let curIdx=0;
const lb=document.getElementById('lb');
const lbImg=document.getElementById('lbImg');
const lbCap=document.getElementById('lbCaption');

function openLb(i){
  curIdx=i; showImg();
  lb.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLb(){
  lb.classList.remove('open');
  document.body.style.overflow='';
}
function navLb(d){
  curIdx=(curIdx+d+FLAT.length)%FLAT.length;
  showImg();
}
function showImg(){
  const f=FLAT[curIdx];
  lbImg.style.opacity='0';
  const tmp=new Image();
  tmp.onload=()=>{lbImg.src=f.full;lbImg.style.opacity='1';};
  tmp.src=f.full;
  lbCap.innerHTML=`${f.roomName}<span>${f.n} / ${f.total}</span>`;
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!lb.classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')navLb(-1);
  if(e.key==='ArrowRight')navLb(1);
});

// Click backdrop to close (but not when clicking the image or buttons)
lb.addEventListener('click',e=>{
  if(e.target===lb||e.target.classList.contains('lb-img-wrap'))closeLb();
});

/* Touch: distinguish TAP (close) from SWIPE (navigate).
   Key fix vs prior bug — only treat as swipe if horizontal move exceeds threshold;
   small movement = tap and we DON'T suppress it. */
let tx=0,ty=0,tmoved=false;
const SWIPE_MIN=45;
lbImg.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; tmoved=false;
},{passive:true});
lbImg.addEventListener('touchmove',e=>{
  const dx=Math.abs(e.touches[0].clientX-tx);
  const dy=Math.abs(e.touches[0].clientY-ty);
  if(dx>10||dy>10)tmoved=true;
},{passive:true});
lbImg.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>SWIPE_MIN && Math.abs(dx)>Math.abs(dy)){
    navLb(dx<0?1:-1);   // swipe left = next
  } else if(Math.abs(dy)>SWIPE_MIN && dy>0){
    closeLb();          // swipe down = close
  }
  // small/no movement → it was a tap on the image; do nothing (keep open)
},{passive:true});

buildFlat();
render();
</script>

</body>
</html>
